<svg viewBox="0 0 720 230" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
<style>
  .bg       { fill: #ffffff }
  .bg-row   { fill: #f6f8fa }
  .border   { stroke: #d0d7de; stroke-width: 0.5 }
  .title    { fill: #1f2328; font-size: 13px; font-weight: 600 }
  .subtitle { fill: #57606a; font-size: 11px }
  .label    { fill: #1f2328; font-size: 12px }
  .label-sm { fill: #57606a; font-size: 11px }
  .val      { fill: #1f2328; font-size: 12px; font-weight: 600 }
  .pct-red  { fill: #ffffff; font-size: 11px; font-weight: 600 }
  .pct-amb  { fill: #ffffff; font-size: 11px; font-weight: 600 }
  .pct-grn  { fill: #ffffff; font-size: 11px; font-weight: 600 }
  .bar-red  { fill: #E24B4A }
  .bar-amb  { fill: #EF9F27 }
  .bar-grn  { fill: #1D9E75 }
  .tick     { stroke: #d0d7de; stroke-width: 0.5 }
  .tick-lbl { fill: #57606a; font-size: 10px }
  .badge-bg-grn { fill: #eaf3de }
  .badge-txt-grn { fill: #3B6D11; font-size: 11px; font-weight: 600 }
  .savings-bg { fill: #1D9E75 }
  .savings-txt { fill: #ffffff; font-size: 11px; font-weight: 600 }
  @media (prefers-color-scheme: dark) {
    .bg       { fill: #0d1117 }
    .bg-row   { fill: #161b22 }
    .border   { stroke: #30363d }
    .title    { fill: #e6edf3 }
    .subtitle { fill: #8b949e }
    .label    { fill: #e6edf3 }
    .label-sm { fill: #8b949e }
    .val      { fill: #e6edf3 }
    .tick     { stroke: #30363d }
    .tick-lbl { fill: #8b949e }
    .badge-bg-grn { fill: #173404 }
    .badge-txt-grn { fill: #97C459 }
  }
</style>

<rect width="720" height="230" rx="8" class="bg border"/>

<text x="24" y="30" class="title">Token consumption</text>
<text x="24" y="46" class="subtitle">Reading a 50-line function inside an 800-line file</text>

<line x1="24" y1="56" x2="696" y2="56" class="tick"/>

<rect x="0" y="57" width="720" height="52" rx="0" class="bg-row" opacity="0.5"/>

<text x="24" y="82" class="label">view full file</text>
<text x="24" y="96" class="label-sm">view_range [1, 800]</text>

<rect x="200" y="64" width="420" height="22" rx="4" class="bar-red"/>
<text x="210" y="79" class="pct-red">100% — 800 lines</text>

<text x="24" y="138" class="label">rough estimate</text>
<text x="24" y="152" class="label-sm">view_range [250, 450]</text>

<rect x="200" y="120" width="105" height="22" rx="4" class="bar-amb"/>
<text x="210" y="135" class="pct-amb">25%</text>
<text x="313" y="135" class="val"> — 200 lines</text>

<rect x="0" y="113" width="720" height="52" rx="0" class="bg-row" opacity="0.5"/>

<text x="24" y="194" class="label">line-locator</text>
<text x="24" y="208" class="label-sm">findtree → findtool → view_range</text>

<rect x="200" y="176" width="42" height="22" rx="4" class="bar-grn"/>
<text x="210" y="191" class="pct-grn">10%</text>
<text x="249" y="191" class="val"> — 80 lines</text>

<rect x="564" y="176" width="108" height="22" rx="4" class="savings-bg"/>
<text x="618" y="191" text-anchor="middle" class="savings-txt">saves ~90%</text>

<line x1="200" y1="57" x2="200" y2="218" class="tick"/>
<line x1="305" y1="57" x2="305" y2="218" class="tick" stroke-dasharray="3,3"/>
<line x1="410" y1="57" x2="410" y2="218" class="tick" stroke-dasharray="3,3"/>
<line x1="515" y1="57" x2="515" y2="218" class="tick" stroke-dasharray="3,3"/>
<line x1="620" y1="57" x2="620" y2="218" class="tick" stroke-dasharray="3,3"/>

<text x="200" y="222" text-anchor="middle" class="tick-lbl">0</text>
<text x="305" y="222" text-anchor="middle" class="tick-lbl">200</text>
<text x="410" y="222" text-anchor="middle" class="tick-lbl">400</text>
<text x="515" y="222" text-anchor="middle" class="tick-lbl">600</text>
<text x="620" y="222" text-anchor="middle" class="tick-lbl">800 lines</text>
</svg>
